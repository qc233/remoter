name: "release"

on:
  push:
    tags:
      - "v*"

jobs:
  # 阶段一：并行编译并上传构建产物
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    outputs:
      release_id: ${{ steps.create-release.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: install frontend dependencies
        run: pnpm install

      # 使用 tauri-action 进行编译，但不让它在这里直接创建 Release
      # 我们利用它的上传功能或者后续统一发布
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        with:
          # 核心改进：由于你是按 Tag 触发，直接使用当前的 Tag 名
          tagName: ${{ github.ref_name }}
          releaseName: "remoter ${{ github.ref_name }}"
          releaseBody: "See the assets below for the latest version."
          releaseDraft: true
          prerelease: false
          # 关键：允许在 Release 已存在时仅上传附件
          allowUpsertDestructiveReleases: true 
          args: ${{ matrix.platform == 'ubuntu-22.04' && '--bundles appimage,deb' || '' }}