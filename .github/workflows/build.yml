name: "build"

on:
  push:
    tags:
      - "v*"

jobs:
  # 阶段一：并行编译并上传构建产物
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    outputs:
      release_id: ${{ steps.create-release.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - name: install frontend dependencies
        run: pnpm install

      # 1. 运行编译命令（不让 tauri-action 处理发布）
      - uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 只编译，不创建 Release
          args: ${{ matrix.platform == 'ubuntu-22.04' && '--bundles appimage,deb' || '' }}

      # 2. 手动将打包出的文件上传为 Artifact
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: remoter-build-${{ matrix.platform }} # 给每个平台的产物起个唯一名字
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error # 如果没找到文件就报错，方便排查路径